<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>智能客服</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header">
      <span>对话管理</span>
      <button id="btn-new">＋ 新对话</button>
    </div>
    <div id="thread-list"></div>
  </div>

  <div id="main">
    <div id="chat-header">智能客服</div>
    <div id="messages"></div>
    <div id="input-area">
      <textarea id="input" placeholder="请输入消息..." rows="1"></textarea>
      <button id="btn-send">发送</button>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
